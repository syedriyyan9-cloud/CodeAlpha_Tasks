{% extends 'base.html' %}

{% block content %}
<div class="text-center mt-5">
    <h1 class="display-4 fw-bold text-success">Welcome to Restaurant Management System</h1>
    <p class="lead mt-3">Manage orders, reservations, and inventory all in one place</p>
    
    {% if not user.is_authenticated %}
        <div class="mt-5">
            <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg me-3">Login</a>
            <a href="{% url 'users:registration' %}" class="btn btn-success btn-lg">Sign Up</a>
        </div>
    {% else %}
        <div class="mt-5">
            <a href="{% url 'users:profile' %}" class="btn btn-primary btn-lg">Go to Profile</a>
        </div>
    {% endif %}
</div>
{% endblock %}
