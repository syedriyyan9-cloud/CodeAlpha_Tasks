{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h3 class="mb-0">Register for {{ event.event_name }}</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-secondary">
                    <strong>Event Details:</strong> {{ event.event_venue }} | {{ event.event_date|date:"F j, Y" }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'users:event_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Complete Registration</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
